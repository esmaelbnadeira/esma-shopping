<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>ESMA SHOPPING</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* LOGIN */

#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: url("https://picsum.photos/1200/800");
background-size:cover;
background-position:center;
}

.login-box{
display:flex;
gap:30px;
background:rgba(255,255,255,0.95);
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.login-img{
width:180px;
height:180px;
object-fit:cover;
border-radius:10px;
}

.form-box{
display:flex;
flex-direction:column;
width:280px;
}

.form-box input{
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

.form-box button{
padding:10px;
border:none;
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

.link{
color:blue;
cursor:pointer;
}

#erro,#erroCadastro{
color:red;
font-weight:bold;
}

/* HEADER */

header{
display:flex;
align-items:center;
gap:10px;
background:#00c853;
padding:15px;
font-size:22px;
font-weight:bold;
color:white;
}

.logo{
width:40px;
}

/* MENU */

.menu{
background:white;
padding:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.menu button{
margin-right:10px;
padding:8px 12px;
cursor:pointer;
}

/* CONTAINER */

.container{
padding:30px;
}

/* PRODUTOS */

.produtos{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.produto{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
}

.produto:hover{
transform:scale(1.05);
}

.produto img{
width:100%;
height:180px;
object-fit:cover;
}

.preco{
color:green;
font-weight:bold;
}

/* HISTORICO */

.remover{
background:red;
color:white;
border:none;
padding:5px 10px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login">

<div class="login-box">

<img class="login-img"
src="https://picsum.photos/200">

<div class="form-box" id="loginBox">

<h2>Entrar</h2>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p class="link" onclick="mostrarCadastro()">Criar conta</p>

<p id="erro"></p>

</div>

<div class="form-box" id="cadastroBox" style="display:none">

<h2>Criar conta</h2>

<input id="novoNome" placeholder="Nome">
<input id="novoEmail" placeholder="Email">
<input id="novoSenha" type="password" placeholder="Senha">

<button onclick="criarConta()">Criar</button>

<p class="link" onclick="mostrarLogin()">Voltar</p>

<p id="erroCadastro"></p>

</div>

</div>

</div>

<!-- SITE -->

<div id="site" style="display:none">

<header>

<img class="logo" src="https://picsum.photos/50">
ESMA SHOPPING

</header>

<div class="menu" id="menu">

<button onclick="mostrar('inicio')">🏠 Inicio</button>
<button onclick="categoria('calcas')">👖 Calças</button>
<button onclick="categoria('sapatos')">👟 Sapatos</button>
<button onclick="categoria('tshirts')">👕 T-Shirts</button>
<button onclick="categoria('camisas')">👔 Camisas</button>

<button onclick="mostrar('carrinho')">🛒 Carrinho</button>

<button onclick="sair()" style="background:red;color:white">🚪 Sair</button>

</div>

<div class="container">

<div id="inicio">
<h2>Produtos</h2>
<div class="produtos" id="listaProdutos"></div>
</div>

<div id="carrinho" style="display:none">
<h2>Carrinho</h2>
<ul id="listaCarrinho"></ul>
</div>

<div id="admin" style="display:none">

<h2>Administrador</h2>

<input id="nome" placeholder="Nome produto">
<input id="preco" placeholder="Preço">
<input id="img" placeholder="Imagem URL">

<select id="categoriaProduto">
<option value="calcas">Calças</option>
<option value="sapatos">Sapatos</option>
<option value="tshirts">T-Shirts</option>
<option value="camisas">Camisas</option>
</select>

<button onclick="addProduto()">Adicionar produto</button>

<h3>Histórico</h3>
<ul id="listaHistorico"></ul>

</div>

</div>

</div>

<script>

let usuarios = []
let produtos = []

let adminEmail="admin"
let adminSenha="1234"

/* LOGIN */

function login(){

let email = document.getElementById("email").value
let senha = document.getElementById("senha").value

if(email === adminEmail && senha === adminSenha){
abrirSite()
return
}

let user = usuarios.find(u=>u.email===email && u.senha===senha)

if(user){
abrirSite()
}else{
document.getElementById("erro").innerText="Login inválido"
}

}

/* CADASTRO */

function criarConta(){

let nome=novoNome.value
let email=novoEmail.value
let senha=novoSenha.value

if(!nome || !email || !senha){
erroCadastro.innerText="Preencha tudo"
return
}

usuarios.push({nome,email,senha})
alert("Conta criada")
mostrarLogin()

}

/* TELAS */

function mostrarCadastro(){
loginBox.style.display="none"
cadastroBox.style.display="block"
}

function mostrarLogin(){
cadastroBox.style.display="none"
loginBox.style.display="block"
}

/* ABRIR SITE */

function abrirSite(){
document.getElementById("login").style.display="none"
document.getElementById("site").style.display="block"
renderProdutos()
}

/* MENU */

function mostrar(sec){

document.querySelectorAll(".container > div")
.forEach(d=>d.style.display="none")

document.getElementById(sec).style.display="block"

}

/* PRODUTOS */

function addProduto(){

let nome=nomeInput.value
let preco=precoInput.value
let img=imgInput.value
let cat=categoriaProduto.value

produtos.push({nome,preco,img,cat})

renderProdutos()
renderHistorico()

}

const nomeInput=document.getElementById("nome")
const precoInput=document.getElementById("preco")
const imgInput=document.getElementById("img")

function renderProdutos(lista=produtos){

listaProdutos.innerHTML=""

lista.forEach(p=>{

listaProdutos.innerHTML+=`

<div class="produto">
<img src="${p.img}">
<h3>${p.nome}</h3>
<p class="preco">${p.preco}</p>
<button onclick="comprar('${p.nome}')">Comprar</button>
</div>

`

})

}

/* HISTORICO */

function renderHistorico(){

listaHistorico.innerHTML=""

produtos.forEach((p,index)=>{

listaHistorico.innerHTML+=`

<li>
${p.nome}
<button class="remover" onclick="removerProduto(${index})">Remover</button>
</li>

`

})

}

function removerProduto(index){
produtos.splice(index,1)
renderProdutos()
renderHistorico()
}

/* CATEGORIA */

function categoria(cat){

let filtrados=produtos.filter(p=>p.cat===cat)

mostrar("inicio")
renderProdutos(filtrados)

}

/* WHATSAPP */

function comprar(nome){
window.open(`https://wa.me/244900000000?text=Quero comprar ${nome}`)
}

/* SAIR */

function sair(){
location.reload()
}

</script>

</body>
</html>
